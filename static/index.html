<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StikGuard AI V2 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">StikGuard AI V2</h1>
                <p class="text-slate-400 text-sm mt-1">Trust & Safety Moderation Platform</p>
            </div>
            
            <!-- Actions -->
            <div class="flex gap-4 items-center relative group">
                <button onclick="clearDashboard()" class="bg-rose-600 hover:bg-rose-500 cursor-pointer px-4 py-2.5 rounded-lg font-medium shadow-lg shadow-rose-500/20 transition-all text-sm flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    Clear History
                </button>
                <input type="file" id="bulk-upload" multiple class="hidden" accept="image/*" onchange="handleBulkUpload(event)">
                <label for="bulk-upload" class="bg-blue-600 hover:bg-blue-500 cursor-pointer px-6 py-2.5 rounded-lg font-medium shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Upload Images
                </label>
            </div>
        </header>
        
        <div id="upload-status" class="hidden mb-6 p-4 rounded bg-slate-800 border border-slate-700 text-slate-300"></div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4 mb-8">
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-slate-400 text-sm font-medium">Total Analyzed</p>
                <p class="text-3xl font-bold mt-1" id="stat-total">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-emerald-400 text-sm font-medium">Safe</p>
                <p class="text-3xl font-bold mt-1 text-emerald-500" id="stat-safe">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-rose-400 text-sm font-medium">Flagged</p>
                <p class="text-3xl font-bold mt-1 text-rose-500" id="stat-flagged">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-amber-400 text-sm font-medium">Pending Review</p>
                <p class="text-3xl font-bold mt-1 text-amber-500" id="stat-review">0</p>
            </div>
            
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-purple-400 text-sm font-medium">Nudity Violations</p>
                <p class="text-2xl font-bold mt-1 text-purple-400" id="stat-nudity">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-pink-400 text-sm font-medium">Suggestive Violations</p>
                <p class="text-2xl font-bold mt-1 text-pink-400" id="stat-suggestive">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-red-400 text-sm font-medium">Weapon Violations</p>
                <p class="text-2xl font-bold mt-1 text-red-400" id="stat-weapons">0</p>
            </div>
            <div class="glass-panel p-4 rounded-xl stat-card col-span-2">
                <p class="text-cyan-400 text-sm font-medium">Gemini Usage</p>
                <p class="text-2xl font-bold mt-1 text-cyan-400" id="stat-gemini">0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="border-b border-slate-700 mb-6">
            <nav class="flex gap-8 overflow-x-auto">
                <button onclick="switchTab('all')" id="tab-all" class="tab-btn pb-4 text-slate-400 hover:text-slate-200 transition-colors font-medium">All Images</button>
                <button onclick="switchTab('safe')" id="tab-safe" class="tab-btn pb-4 text-slate-400 hover:text-slate-200 transition-colors font-medium">Safe</button>
                <button onclick="switchTab('flagged')" id="tab-flagged" class="tab-btn pb-4 text-slate-400 hover:text-slate-200 transition-colors font-medium">Flagged</button>
                <button onclick="switchTab('gemini')" id="tab-gemini" class="tab-btn pb-4 text-cyan-400 hover:text-cyan-300 transition-colors font-medium">✨ AI Escalated</button>
                <button onclick="switchTab('review')" id="tab-review" class="tab-btn pb-4 text-slate-400 hover:text-slate-200 transition-colors font-medium">Human Review Queue</button>
            </nav>
        </div>

        <!-- Gallery -->
        <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Images will be rendered here -->
        </div>
    </div>

    <script>
        let currentTab = 'all';

        async function fetchStats() {
            try {
                const res = await fetch('/stats');
                const data = await res.json();
                document.getElementById('stat-total').innerText = data.total_uploads;
                document.getElementById('stat-safe').innerText = data.safe_count;
                document.getElementById('stat-flagged').innerText = data.flagged_count;
                document.getElementById('stat-review').innerText = data.review_count;
                
                document.getElementById('stat-nudity').innerText = data.violations.nudity;
                document.getElementById('stat-suggestive').innerText = data.violations.suggestive;
                document.getElementById('stat-weapons').innerText = data.violations.weapons;
                document.getElementById('stat-gemini').innerText = data.gemini_usage;
            } catch (e) {
                console.error("Failed to load stats", e);
            }
        }

        async function fetchImages(status) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '<p class="text-slate-500 col-span-full">Loading...</p>';
            
            try {
                const res = await fetch(`/images/${status}`);
                const images = await res.json();
                
                gallery.innerHTML = '';
                
                if (images.length === 0) {
                    gallery.innerHTML = `<p class="text-slate-500 col-span-full">No ${status} images found.</p>`;
                    return;
                }

                images.forEach(img => {
                    const isSafe = img.final_decision === 'SAFE';
                    const isFlagged = img.final_decision === 'FLAG';
                    const isReview = img.review_status === 'PENDING';
                    
                    let statusColor = isSafe ? 'text-emerald-400 bg-emerald-400/10 border border-emerald-400/20' : 
                                     (isFlagged ? 'text-rose-400 bg-rose-400/10 border border-rose-400/20' : 'text-amber-400 bg-amber-400/10 border border-amber-400/20');
                    
                    if (isReview) statusColor = 'text-amber-400 bg-amber-400/10 border border-amber-400/20';

                    const dateStr = new Date(img.upload_time).toLocaleString();
                    
                    let clipOut = {};
                    try { clipOut = img.clip_output ? JSON.parse(img.clip_output) : {}; } catch(e){}
                    
                    let actionHtml = '';
                    if (isReview) {
                        actionHtml = `
                        <div class="mt-3 flex gap-2">
                            <button onclick="handleOverride(${img.id}, 'approve')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white text-xs py-2 rounded transition-colors border border-emerald-500">Approve (Safe)</button>
                            <button onclick="handleOverride(${img.id}, 'reject')" class="flex-1 bg-rose-600 hover:bg-rose-500 text-white text-xs py-2 rounded transition-colors border border-rose-500">Reject (Flag)</button>
                        </div>
                        `;
                    } else if (img.human_override) {
                        actionHtml = `<div class="mt-3 text-xs text-center p-1 bg-blue-900/50 text-blue-300 rounded border border-blue-700">🧑‍⚖️ Human Overridden</div>`;
                    } else {
                        // Allow overriding any image
                        actionHtml = `
                        <div class="mt-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            ${isSafe ? '' : `<button onclick="handleOverride(${img.id}, 'approve')" class="flex-1 bg-slate-700 hover:bg-emerald-600 text-slate-300 hover:text-white text-[10px] py-1.5 rounded transition-colors">Force Safe</button>`}
                            ${isFlagged ? '' : `<button onclick="handleOverride(${img.id}, 'reject')" class="flex-1 bg-slate-700 hover:bg-rose-600 text-slate-300 hover:text-white text-[10px] py-1.5 rounded transition-colors">Force Flag</button>`}
                        </div>
                        `;
                    }
                    
                    const isGemini = img.gemini_score !== null;

                    const card = `
                        <div class="glass-panel rounded-xl overflow-hidden fade-in group border border-slate-700 hover:border-slate-500 transition-colors flex flex-col relative ${isGemini ? 'ring-1 ring-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.1)]' : ''}">
                            <div class="aspect-square bg-slate-800 relative">
                                <img src="/${img.image_url}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" alt="Moderated Image">
                                <div class="absolute top-2 right-2 px-2 py-1 rounded text-xs font-bold ${statusColor} backdrop-blur-md shadow-lg uppercase">
                                    ${isReview ? 'PENDING REVIEW' : img.final_decision}
                                </div>
                                <div class="absolute bottom-2 left-2 px-2 py-1 rounded text-[10px] font-bold text-white bg-black/60 backdrop-blur shadow">
                                    ${img.final_category}
                                </div>
                                ${isGemini ? `<div class="absolute top-2 left-2 px-2 py-1 rounded text-[10px] font-bold text-cyan-900 bg-cyan-400 shadow shadow-cyan-400/20">✨ AI Escalated</div>` : ''}
                            </div>
                            <div class="p-4 flex-1 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-2">
                                        <p class="text-[10px] text-slate-500 font-mono" title="${img.image_hash}">${img.image_hash ? img.image_hash.substring(0,8)+'...' : 'N/A'}</p>
                                        <p class="text-[10px] text-slate-500">${dateStr}</p>
                                    </div>
                                    
                                    <div class="space-y-1 mt-3">
                                        <div class="flex justify-between text-xs">
                                            <span class="text-slate-400">NudeNet</span>
                                            <span class="text-slate-200">${img.nudenet_score ? img.nudenet_score.toFixed(3) : '0.000'}</span>
                                        </div>
                                        <div class="flex flex-col text-xs bg-slate-800/50 rounded p-1.5 border border-slate-700/50 mt-1 mb-1">
                                            <div class="flex justify-between mb-1">
                                                <span class="text-slate-400 font-medium">OpenCLIP</span>
                                                <span class="text-slate-200">${img.clip_score ? img.clip_score.toFixed(3) : '0.000'}</span>
                                            </div>
                                            <div class="flex justify-between text-[10px] mt-0.5">
                                                <span class="text-emerald-400/80 truncate w-1/2 pr-1" title="${clipOut.best_context || ''}">C: ${clipOut.best_context || 'N/A'}</span>
                                                <span class="text-rose-400/80 truncate w-1/2 text-right pl-1" title="${clipOut.best_risk || ''}">R: ${clipOut.best_risk || 'N/A'}</span>
                                            </div>
                                        </div>
                                        <div class="flex justify-between text-xs">
                                            <span class="text-slate-400">YOLO</span>
                                            <span class="text-slate-200">${img.yolo_score ? img.yolo_score.toFixed(3) : '0.000'}</span>
                                        </div>
                                        ${img.gemini_score !== null ? `
                                        <div class="flex justify-between text-xs pt-1 border-t border-slate-700 mt-1">
                                            <span class="text-indigo-400 font-medium">Gemini</span>
                                            <span class="text-indigo-300 font-medium">${img.gemini_score.toFixed(3)}</span>
                                        </div>
                                        ` : ''}
                                    </div>
                                </div>
                                ${actionHtml}
                            </div>
                        </div>
                    `;
                    gallery.insertAdjacentHTML('beforeend', card);
                });
            } catch (e) {
                gallery.innerHTML = '<p class="text-rose-500 col-span-full">Error loading images.</p>';
            }
        }

        async function handleOverride(id, action) {
            try {
                await fetch(`/human-review/${id}?action=${action}`, { method: 'POST' });
                fetchImages(currentTab);
                fetchStats();
            } catch (e) {
                alert("Failed to override decision");
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'text-blue-400', 'border-b-2', 'border-blue-400'));
            
            const activeBtn = document.getElementById(`tab-${tab}`);
            activeBtn.classList.add('active', 'text-blue-400', 'border-b-2', 'border-blue-400');
            
            fetchImages(tab);
        }

        async function clearDashboard() {
            if (!confirm("Are you sure you want to clear the dashboard history?\\nThe actual image files will be PRESERVED in their safe/flagged folders.")) {
                return;
            }
            try {
                await fetch('/clear-history', { method: 'POST' });
                fetchImages(currentTab);
                fetchStats();
            } catch (e) {
                alert("Failed to clear dashboard");
            }
        }

        async function handleBulkUpload(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            const statusDiv = document.getElementById('upload-status');
            statusDiv.classList.remove('hidden');
            statusDiv.innerHTML = `Uploading and analyzing ${files.length} image(s)... This might take a moment.`;

            let successCount = 0;
            let flagCount = 0;
            let reviewCount = 0;
            let errorCount = 0;

            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);

                try {
                    const res = await fetch('/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        if (data.status === 'SAFE') successCount++;
                        else if (data.status === 'FLAG') flagCount++;
                        else reviewCount++;
                    } else {
                        errorCount++;
                    }
                } catch (e) {
                    errorCount++;
                }
            }

            statusDiv.innerHTML = `
                <p class="font-medium text-emerald-400">Complete! Analysis results:</p>
                <ul class="mt-2 text-sm space-y-1">
                    <li>✅ ${successCount} marked Safe</li>
                    <li>🚫 ${flagCount} marked Flagged</li>
                    <li>⚠️ ${reviewCount} sent to Human Review</li>
                    ${errorCount > 0 ? `<li class="text-rose-400">❌ ${errorCount} failed to upload</li>` : ''}
                </ul>
            `;

            // Refresh the current view
            fetchStats();
            fetchImages(currentTab);
            
            // Clear input so same files can be selected again if needed
            event.target.value = '';
            
            // Hide status after 5 seconds
            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 5000);
        }

        // Initialize
        fetchStats();
        switchTab('all');
    </script>
</body>
</html>
